name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install minimal deps
        run: |
          python -m pip install --upgrade pip
          # CI 不裝 ollama / GPU / 大型模型;裝跑 lint / smoke test 必要的
          pip install pytest ruff
          # mcp = MCP server smoke test 需要(主產品路線)
          pip install mcp
          if [ -f requirements.txt ]; then
            pip install requests numpy || true
          fi

      - name: Compile all .py files (syntax sanity)
        run: python -m compileall -q .

      - name: Eval consistency
        run: python scripts/check_eval_consistency.py

      - name: README consistency
        run: python scripts/check_readme_consistency.py

      - name: Doctor (no-network)
        run: python scripts/doctor.py --no-network

      - name: Pytest (deterministic — disable third-party plugin autoload)
        run: python scripts/run_tests.py -q

      - name: Ruff (advisory — does not fail CI yet)
        run: ruff check tests scripts || true
