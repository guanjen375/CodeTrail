name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install minimal deps
        run: |
          python -m pip install --upgrade pip
          # CI 不裝 ollama / numpy 模型相關 heavy deps，只裝跑 lint/test 必要的
          pip install pytest ruff
          # requirements.txt 裡 mcp 套件對 CI 不是必需；requests/numpy 體積小可裝
          if [ -f requirements.txt ]; then
            pip install requests numpy || true
          fi

      - name: Compile all .py files (syntax sanity)
        run: python -m compileall -q .

      - name: Eval consistency
        run: python scripts/check_eval_consistency.py

      - name: README consistency
        run: python scripts/check_readme_consistency.py

      - name: Doctor (no-network)
        run: python scripts/doctor.py --no-network

      - name: Pytest
        run: python -m pytest -q

      - name: Ruff (advisory — does not fail CI yet)
        run: ruff check tests scripts || true
